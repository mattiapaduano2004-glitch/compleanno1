<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Invito Compleanno</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 400px;
            max-width: 95%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎉 Invito Compleanno 🎂</h1>
    <div class="subtitle">Compila il modulo per confermare la tua presenza</div>

    <iframe 
        src="https://docs.google.com/forms/d/e/1FAIpQLSe6lahWTY5De8W3RemYk2TZnEHAkJk_cXItOyGSg9eZbCtgCw/viewform?usp=header">
        Caricamento…
    </iframe>

    <div class="footer">
        Ti aspettiamo! 🎈
    </div>
</div>

</body>
</html>
